<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrTok</title><style>
body{margin:0;font-family:Arial;background:#f0f2f5}
.screen{display:none}
.active{display:block}

#loginScreen{display:flex;justify-content:center;align-items:center;height:100vh}
.login-box{background:white;padding:20px;border-radius:10px;width:90%;max-width:350px}

input,textarea{width:100%;padding:10px;margin:5px 0;border-radius:6px;border:1px solid #ccc}
button{padding:10px;border:none;border-radius:6px;background:#1877f2;color:white;width:100%;margin-top:5px}

#top{background:white;padding:10px;display:flex;justify-content:space-between;position:sticky;top:0}
#posts{padding:10px}
.post{background:white;padding:10px;margin-bottom:10px;border-radius:10px}

#uploadModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center}
.box{background:white;padding:20px;border-radius:10px;width:90%;max-width:400px}
</style><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, increment, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBb-sYq3uJwIJCOPqYRyqAR_U3VdMp1C5o",
  authDomain: "ortok-c2e04.firebaseapp.com",
  projectId: "ortok-c2e04",
  storageBucket: "ortok-c2e04.firebasestorage.app",
  messagingSenderId: "46153502831",
  appId: "1:46153502831:web:98b402559e15cbd240fd9a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// REGISTER
window.register = async () => {
  try{
    const email = document.getElementById("emailInput").value;
    const pass = document.getElementById("passwordInput").value;
    const usern = document.getElementById("usernameInput").value;

    const snap = await getDocs(collection(db,"users"));
    let exists=false;

    snap.forEach(d=>{
      if(d.data().username.toLowerCase()===usern.toLowerCase()){
        exists=true;
      }
    });

    if(exists){
      alert("Nome já usado");
      return;
    }

    await createUserWithEmailAndPassword(auth,email,pass);
    alert("Conta criada!");

  }catch(e){
    alert("Erro ao criar conta");
  }
};

// LOGIN
window.login = async () => {
  try{
    const email = document.getElementById("emailInput").value;
    const pass = document.getElementById("passwordInput").value;

    await signInWithEmailAndPassword(auth,email,pass);
    alert("Logado!");

  }catch(e){
    alert("Erro ao logar");
  }
};

// SWITCH SCREEN
onAuthStateChanged(auth,(user)=>{
  if(user){
    document.getElementById("loginScreen").classList.remove("active");
    document.getElementById("appScreen").classList.add("active");
    loadPosts();
  }
});

// MODAL
window.openUpload=()=>document.getElementById("uploadModal").style.display="flex";
window.closeUpload=()=>document.getElementById("uploadModal").style.display="none";

// CREATE POST
window.createPost = async()=>{
  const user = auth.currentUser;

  await addDoc(collection(db,"posts"),{
    title:document.getElementById("title").value,
    description:document.getElementById("desc").value,
    likes:0,
    email:user.email
  });

  closeUpload();
};

// LIKE
window.likePost = async(id)=>{
  await updateDoc(doc(db,"posts",id),{
    likes:increment(1)
  });
};

// LOAD POSTS
function loadPosts(){
  onSnapshot(collection(db,"posts"),(snap)=>{
    const container = document.getElementById("posts");
    container.innerHTML="";

    snap.forEach(d=>{
      const p=d.data();

      container.innerHTML+=`
      <div class='post'>
        <b>${p.email}</b>
        <h3>${p.title}</h3>
        <p>${p.description}</p>
        <button onclick="likePost('${d.id}')">Curtir (${p.likes})</button>
      </div>`;
    });
  });
}
</script></head><body><div id="loginScreen" class="screen active">
  <div class="login-box">
    <h2>OrTok</h2>
    <input id="emailInput" placeholder="Email">
    <input id="passwordInput" type="password" placeholder="Senha">
    <input id="usernameInput" placeholder="Username">
    <button onclick="login()">Entrar</button>
    <button onclick="register()">Criar conta</button>
  </div>
</div><div id="appScreen" class="screen">
  <div id="top">
    <h3>OrTok</h3>
    <button onclick="openUpload()">Criar</button>
  </div>  <div id="posts"></div>
</div><div id="uploadModal">
  <div class="box">
    <h3>Criar publicação</h3>
    <input id="title" placeholder="Título">
    <textarea id="desc" placeholder="Descrição"></textarea>
    <button onclick="createPost()">Publicar</button>
    <button onclick="closeUpload()">Cancelar</button>
  </div>
</div></body>
</html>
