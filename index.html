<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrTok</title><style>
body{margin:0;font-family:sans-serif;background:#0f0f0f;color:white}

.screen{display:none;padding:20px}
.active{display:block}

input, textarea{
  width:100%;
  margin:5px 0;
  padding:10px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#00ff88;
  font-weight:bold;
}

#top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.post{
  background:#1a1a1a;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

#uploadModal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.box{
  background:#1a1a1a;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:400px;
}
</style><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, increment, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBb-sYq3uJwIJCOPqYRyqAR_U3VdMp1C5o",
  authDomain: "ortok-c2e04.firebaseapp.com",
  projectId: "ortok-c2e04",
  storageBucket: "ortok-c2e04.firebasestorage.app",
  messagingSenderId: "46153502831",
  appId: "1:46153502831:web:98b402559e15cbd240fd9a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.register = async () => {
  const email = emailInput.value;
  const pass = passwordInput.value;
  const usern = usernameInput.value;

  const snap = await getDocs(collection(db,"users"));
  let exists=false;
  snap.forEach(d=>{
    if(d.data().username.toLowerCase()===usern.toLowerCase()) exists=true;
  });

  if(exists) return alert("Nome já usado");

  const cred = await createUserWithEmailAndPassword(auth,email,pass);

  await addDoc(collection(db,"users"),{
    username:usern,
    email,
    uid:cred.user.uid
  });
};

window.login = async () =>{
  await signInWithEmailAndPassword(auth,emailInput.value,passwordInput.value);
};

onAuthStateChanged(auth,(user)=>{
  if(user){
    loginScreen.classList.remove("active");
    appScreen.classList.add("active");
    loadPosts();
  }
});

window.openUpload=()=>uploadModal.style.display="flex";
window.closeUpload=()=>uploadModal.style.display="none";

window.createPost = async()=>{
  const user = auth.currentUser;
  await addDoc(collection(db,"posts"),{
    title:title.value,
    description:desc.value,
    likes:0,
    email:user.email
  });
  closeUpload();
};

window.likePost=async(id)=>{
  await updateDoc(doc(db,"posts",id),{
    likes:increment(1)
  });
};

function loadPosts(){
  onSnapshot(collection(db,"posts"),(snap)=>{
    posts.innerHTML="";
    snap.forEach(d=>{
      const p=d.data();
      posts.innerHTML+=`
      <div class='post'>
        <small>${p.email}</small>
        <h3>${p.title}</h3>
        <p>${p.description}</p>
        <button onclick="likePost('${d.id}')">❤️ ${p.likes}</button>
      </div>`;
    });
  });
}
</script></head><body><div id="loginScreen" class="screen active">
  <h2>OrTok Login</h2>
  <input id="emailInput" placeholder="Email">
  <input id="passwordInput" type="password" placeholder="Senha">
  <input id="usernameInput" placeholder="Username (só cadastro)">
  <button onclick="login()">Login</button>
  <button onclick="register()">Criar Conta</button>
</div><div id="appScreen" class="screen">
  <div id="top">
    <h2>OrTok</h2>
    <button onclick="openUpload()">➕</button>
  </div>  <div id="posts"></div>
</div><div id="uploadModal">
  <div class="box">
    <h3>Post</h3>
    <input id="title" placeholder="Título">
    <textarea id="desc" placeholder="Descrição"></textarea>
    <button onclick="createPost()">Postar</button>
    <button onclick="closeUpload()">Cancelar</button>
  </div>
</div></body>
</html>
