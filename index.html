<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrTok</title>

<style>
body{margin:0;font-family:Arial;background:#f0f2f5}

/* TELAS */
.screen{display:none !important}
.active{display:block !important}

/* LOGIN */
#loginScreen.active{
  display:flex !important;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.login-box{
  background:white;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:350px;
}

/* INPUTS */
input,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

/* BOTÕES */
button{
  padding:10px;
  border:none;
  border-radius:6px;
  background:#1877f2;
  color:white;
  width:100%;
  margin-top:5px;
}

/* POSTS */
#posts{padding:10px}
.post{
  background:white;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
}

/* BOTÃO FLUTUANTE */
#uploadBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  font-size:25px;
}

/* MODAL */
#uploadModal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

.box{
  background:white;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:400px;
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ortok-c2e04.firebaseapp.com",
  projectId: "ortok-c2e04"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* BOTÕES */
window.onload = () => {
  loginBtn.onclick = login;
  registerBtn.onclick = register;
};

/* CADASTRO */
async function register(){
  try{
    const email = emailInput.value;
    const pass = passwordInput.value;
    const usern = usernameInput.value;

    if(!email || !pass || !usern){
      alert("Preenche tudo");
      return;
    }

    const snap = await getDocs(collection(db,"users"));
    let exists=false;

    snap.forEach(d=>{
      if(d.data().username.toLowerCase() === usern.toLowerCase()){
        exists=true;
      }
    });

    if(exists){
      alert("Nome já usado");
      return;
    }

    const cred = await createUserWithEmailAndPassword(auth,email,pass);

    await addDoc(collection(db,"users"),{
      username:usern,
      email,
      uid:cred.user.uid
    });

    alert("Conta criada!");

  }catch(e){
    alert(e.code);
  }
}

/* LOGIN */
async function login(){
  try{
    if(!emailInput.value || !passwordInput.value){
      alert("Preenche tudo");
      return;
    }

    await signInWithEmailAndPassword(auth,emailInput.value,passwordInput.value);

  }catch(e){
    alert(e.code);
  }
}

/* TROCAR TELA */
onAuthStateChanged(auth,(user)=>{
  if(user){
    loginScreen.classList.remove("active");
    appScreen.classList.add("active");
    loadPosts();
  }
});

/* MODAL */
window.openUpload=()=>uploadModal.style.display="flex";
window.closeUpload=()=>uploadModal.style.display="none";

/* POST */
window.createPost = async()=>{
  const user = auth.currentUser;

  await addDoc(collection(db,"posts"),{
    title:title.value,
    description:desc.value,
    likes:[],
    email:user.email
  });

  title.value="";
  desc.value="";

  closeUpload();
};

/* LIKE (CORRIGIDO) */
window.likePost = async(id)=>{
  const user = auth.currentUser;
  const ref = doc(db,"posts",id);

  const snap = await getDoc(ref);
  const data = snap.data();

  let likes = data.likes || [];

  if(likes.includes(user.uid)){
    likes = likes.filter(uid => uid !== user.uid);
  }else{
    likes.push(user.uid);
  }

  await updateDoc(ref,{ likes });
};

/* POSTS */
function loadPosts(){
  onSnapshot(collection(db,"posts"),(snap)=>{
    posts.innerHTML="";

    snap.forEach(d=>{
      const p=d.data();

      posts.innerHTML+=`
      <div class='post'>
        <b>${p.email}</b>
        <h3>${p.title}</h3>
        <p>${p.description}</p>
        <button onclick="likePost('${d.id}')">
          Curtir (${p.likes ? p.likes.length : 0})
        </button>
      </div>`;
    });
  });
}
</script>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="login-box">
    <h2>OrTok</h2>
    <input id="emailInput" placeholder="Email">
    <input id="passwordInput" type="password" placeholder="Senha">
    <input id="usernameInput" placeholder="Username">
    <button id="loginBtn">Entrar</button>
    <button id="registerBtn">Criar conta</button>
  </div>
</div>

<!-- APP -->
<div id="appScreen" class="screen">
  <div id="posts"></div>

  <!-- BOTÃO UPLOAD -->
  <button id="uploadBtn" onclick="openUpload()">+</button>
</div>

<!-- MODAL -->
<div id="uploadModal">
  <div class="box">
    <h3>Criar publicação</h3>
    <input id="title" placeholder="Título">
    <textarea id="desc" placeholder="Descrição"></textarea>
    <button onclick="createPost()">Publicar</button>
    <button onclick="closeUpload()">Cancelar</button>
  </div>
</div>

</body>
</html>
